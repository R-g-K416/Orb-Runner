<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Runner Game</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#222;
}

#game{

width:100vw;
height:100vh;

position:relative;

overflow:hidden;

background:
linear-gradient(
#6ec6ff,
#dff6ff
);

}

#player{

width:50px;
height:50px;

background:red;

position:absolute;

bottom:60px;

left:50%;

transform:
translateX(-50%);

border-radius:12px;

display:none;

}

.obstacle{

width:60px;
height:60px;

background:black;

position:absolute;

top:-80px;

border-radius:12px;

}

.orb{

width:30px;
height:30px;

background:gold;

position:absolute;

top:-40px;

border-radius:50%;

}

#score{

position:absolute;

top:10px;
left:10px;

font-size:28px;

color:white;

z-index:100;

display:none;

}

#menu{

position:absolute;

width:100%;
height:100%;

display:flex;

justify-content:center;

align-items:center;

z-index:200;

}

button{

padding:18px 35px;

font-size:24px;

border:none;

border-radius:14px;

cursor:pointer;

}

</style>

</head>

<body>

<div id="menu">

<button onclick="startGame()">

Start Game

</button>

</div>

<div id="score">

Score: 0

</div>

<div id="game">

<div id="player"></div>

</div>

<script>

const game =
document.getElementById("game");

const player =
document.getElementById("player");

const scoreText =
document.getElementById("score");

const menu =
document.getElementById("menu");

let started=false;

let score=0;

let gameOver=false;

let obstacleSpeed=7;

let orbSpeed=6;



document.addEventListener(
"mousemove",
(e)=>{

if(started){

player.style.left=
e.clientX+"px";

}

}
);



document.addEventListener(
"touchmove",
(e)=>{

if(started){

player.style.left=
e.touches[0].clientX+"px";

}

}
);



function collision(a,b){

let p=
a.getBoundingClientRect();

let o=
b.getBoundingClientRect();

return !(

p.right<o.left ||

p.left>o.right ||

p.bottom<o.top ||

p.top>o.bottom

);

}



function obstacle(){

if(gameOver)return;

let x=
document.createElement("div");

x.className=
"obstacle";

x.style.left=

Math.random()

*(window.innerWidth-60)

+"px";

game.appendChild(x);

let y=-80;

let move=
setInterval(()=>{

if(gameOver){

clearInterval(move);

x.remove();

return;

}

y+=obstacleSpeed;

x.style.top=
y+"px";

if(
collision(player,x)
&& !gameOver
){

gameOver=true;

alert(
"Game Over\nScore: "
+score
);

location.reload();

}

if(
y>window.innerHeight
){

x.remove();

clearInterval(move);

}

},20);

}



function orb(){

if(gameOver)return;

let x=
document.createElement("div");

x.className=
"orb";

x.style.left=

Math.random()

*(window.innerWidth-30)

+"px";

game.appendChild(x);

let y=-40;

let move=
setInterval(()=>{

if(gameOver){

clearInterval(move);

x.remove();

return;

}

y+=orbSpeed;

x.style.top=
y+"px";

if(
collision(player,x)
){

score++;

if(
score%50===0
){

obstacleSpeed+=2;

orbSpeed+=1;

}

scoreText.innerHTML=

"Score: "
+score;

x.remove();

clearInterval(move);

}

if(
y>window.innerHeight
){

x.remove();

clearInterval(move);

}

},20);

}



function startGame(){

started=true;

menu.style.display=
"none";

player.style.display=
"block";

scoreText.style.display=
"block";

setInterval(
obstacle,
1200
);

setInterval(
orb,
700
);

}

</script>

</body>

</html>
